<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Produtos
  </title>

  <link
    rel="stylesheet"
    href="css/cliente.css"
  >

</head>

<body>

  <!-- =====================================
  TOPO
  ====================================== -->
  <header class="top-bar">

    <div class="top-left">

      <h1>
        🛍️ Produtos
      </h1>

    </div>

    <div class="top-right">

      <span
        id="userName"
        class="user"
      >
        👤 Usuário
      </span>

      <a
        href="#"
        class="logout"
      >
        Sair
      </a>

    </div>

  </header>

  <!-- =====================================
  LISTA PRODUTOS
  ====================================== -->
  <section id="lista">
  </section>

  <!-- =====================================
  CARRINHO
  ====================================== -->

  <aside
    id="carrinho"
    class="carrinho"
  >

    <!-- HEADER -->
    <div class="carrinho-header">

      <h2>
        Seu Carrinho
      </h2>

      <button onclick="toggleCarrinho()">
        ✕
      </button>

    </div>

    <!-- ITENS -->
    <div id="cart-items">
    </div>

    <!-- FOOTER -->
    <div class="carrinho-footer">

      <h3>

        Total:
        R$

        <span id="cart-total">
          0.00
        </span>

      </h3>

      <button
        class="finalizar-btn"
        onclick="finalizarCompra()"
      >
        Finalizar Compra
      </button>

    </div>

  </aside>

  <!-- =====================================
  BOTÃO CARRINHO
  ====================================== -->
  <button
    class="cart-button"
    onclick="toggleCarrinho()"
  >

    🛒

    <span id="cart-count">
      0
    </span>

  </button>

  <!-- =====================================
  BOTÃO CHAT
  ====================================== -->
  <button
    id="abrirChat"
    class="chat-button"
  >
    💬
  </button>

  <!-- =====================================
  CHAT
  ====================================== -->
  <div
    id="chatBox"
    class="chat-box"
  >

    <!-- HEADER -->
    <div class="chat-header">

      <div class="chat-info">

        <div class="chat-avatar">
          💬
        </div>

        <div class="chat-textos">

          <h3 id="chatTitulo">
            Suporte
          </h3>

          <span id="chatStatus">
            🟢 Online
          </span>

          <small id="statusDigitando">
          </small>

        </div>

      </div>

      <button id="fecharChat">
        ✕
      </button>

    </div>

    <!-- =====================================
    ÁREA ADMIN
    ====================================== -->

    <div
      id="clientesOnline"
      class="clientes-online"
    >
    </div>

    <!-- =====================================
    MENSAGENS
    ====================================== -->

    <div
      id="mensagens"
      class="chat-messages"
    >
    </div>

    <!-- =====================================
    INPUT
    ====================================== -->

    <div class="chat-input-area">

      <input
        type="text"
        id="inputMensagem"
        placeholder="Digite sua mensagem..."
        autocomplete="off"
      >

      <button id="btnEnviar">
        Enviar
      </button>

    </div>

  </div>

  <!-- =====================================
  SOCKET.IO
  ====================================== -->

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js">
  </script>

  <!-- =====================================
  CLIENT JS
  ====================================== -->

  <script
    src="js/cliente.js"
    type="module"
  ></script>

</body>

</html>
