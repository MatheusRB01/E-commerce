<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h2>NeckhArts</h2>
    <div class="nav-links">
      <a href="login.html">Login</a>
      <a href="register.html">Cadastro</a>
    </div>
  </nav>

  <!-- CONTEÚDO -->
  <main class="main">
    <div class="login-box">

      <h1>Cadastro</h1>

      <form id="registerForm">
        <input type="text" id="regNome" placeholder="Nome" required>
        <input type="email" id="regEmail" placeholder="Email" required>
        <input type="password" id="regSenha" placeholder="Senha" required>
        <input type="text" id="regTell" placeholder="Telefone" required>

        <button type="submit">Cadastrar</button>
      </form>

      <a href="login.html" class="login-link">Já tenho conta</a>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© NeckhArts</p>
  </footer>

  <script type="module" src="js/register.js"></script>
  <script src="js/transition.js"></script>

</body>
</html>
