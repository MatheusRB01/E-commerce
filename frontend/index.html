<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/adimin.css">
  <title>Admin - Produtos</title>
</head>

<body>

  <!-- CHAT FLUTUANTE -->
  <div id="chatBox" class="chat-box">

    <div class="chat-header">
      <h3>💬 Atendimento</h3>
      <button id="fecharChat">✖</button>
    </div>

    <div id="mensagens" class="chat-messages">
      <div class="message other">Olá 👋</div>
    </div>

    <div class="chat-input-area">
      <input type="text" id="inputMensagem" placeholder="Digite uma mensagem...">
      <button id="btnEnviar">Enviar</button>
    </div>

  </div>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">🛒 AdminPanel</div>

    <nav class="nav-links">
      <a href="#">Dashboard</a>
      <a href="#">Produtos</a>
      <a href="#">Pedidos</a>
      <a href="usuarios.html">Usuários</a>
    </nav>

    <div class="top-actions">
      <button id="abrirChat" class="chat-button">💬 Suporte</button>
      <div class="user">👤 Admin</div>
    </div>
  </header>

  <!-- CONTAINER -->
  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h3>Menu</h3>
      <a href="#">➕ Cadastrar Produto</a>
      <a href="#">📦 Listar Produtos</a>
      <a href="#">📊 Relatórios</a>
      <a href="#">⚙️ Configurações</a>
      <a href="#" class="logout">Sair</a>
    </aside>

    <!-- APP -->
    <main id="app">

      <div class="page">

        <h2>Cadastrar Produto</h2>

        <form id="form">
          <input id="nome" placeholder="Nome" required>
          <input id="valor" type="number" placeholder="Valor" required>
          <input id="descri" placeholder="Descrição">

          <label for="imagem" class="file-upload">
            📷 Clique para enviar imagem
            <input type="file" id="imagem">
          </label>

          <div id="preview-container">
            <img id="preview-img" alt="Preview">
          </div>

          <button type="submit">Cadastrar</button>
        </form>

        <section id="lista"></section>

      </div>

    </main>
  </div>

  <!-- SOCKET -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module" src="script.js"></script>

</body>
</html>
